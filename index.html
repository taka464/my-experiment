<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験ポータルサイト</title>
    <style>
        :root {
            /* 爽やかなライトブルーの背景 */
            --primary-bg: #f0f7ff;
            --card-bg: #ffffff;
            /* 信頼感のある明るいブルーをアクセントカラーに */
            --accent-color: #4a90e2; 
            --text-color: #2c3e50;
            --sub-text: #546e7a;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            --hover-shadow: 0 12px 20px rgba(74, 144, 226, 0.2);
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 4rem 1rem;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding-bottom: 4rem;
        }

        .intro {
            margin-bottom: 3rem;
            text-align: center;
            font-size: 1.15rem;
            color: var(--sub-text);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(74, 144, 226, 0.1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .card p {
            flex-grow: 1;
            color: var(--sub-text);
            margin-bottom: 2rem;
        }

        .btn {
            display: inline-block;
            text-align: center;
            background-color: var(--accent-color);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #357abd;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.7rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>尚絅学院大学 心理学実験室</h1>
    </header>

    <div class="container">
        <section class="intro">
            <p>ご訪問ありがとうございます。以下の実験へのご協力をお願いいたします。<br>各実験は数分で終わります。スマートフォンからも参加可能です。</p>
        </section>

        <main class="grid">
            <article class="card">
                <h2>実験0：はじめてのWebページ</h2>
                <p>第2回で作成した記念すべき「Hello World」のページです。</p>
                <a href="hello_world.html" class="btn">Hello Worldを見る</a>
            </article>

            <article class="card">
                <h2>実験1：ストループ課題</h2>
                <p>「文字の意味」と「文字の色」の干渉を調べる、簡単なキーボード入力のテストです。（所要時間：約3分）</p>
                <a href="stroop.html" class="btn">実験1に参加する</a>
            </article>

            <article class="card">
                <h2>実験2：ミュラー・リヤー錯視</h2>
                <p>図形の長さが違って見える錯覚を測る、スライダーを使った視覚のテストです。（所要時間：約2分）</p>
                <a href="muller_lyer_final.html" class="btn">実験2に参加する</a>
            </article>
        </main>
    </div>

</body>
</html>
