<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験ポータルサイト</title>
    <style>
        :root {
            --primary-bg: #f0f7ff;
            --card-bg: #ffffff;
            --accent-color: #4a90e2; 
            --text-color: #2c3e50;
            --sub-text: #546e7a;
            --shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            --hover-shadow: 0 12px 20px rgba(74, 144, 226, 0.2);
            --secondary-color: #6c757d;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            line-height: 1.6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            padding: 4rem 1rem;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .container {
            max-width: 800px;
            width: 90%;
            padding-bottom: 4rem;
        }

        .intro {
            margin-bottom: 3rem;
            text-align: center;
            font-size: 1.15rem;
            color: var(--sub-text);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(74, 144, 226, 0.1);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: var(--hover-shadow);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        .card p {
            flex-grow: 1;
            color: var(--sub-text);
            margin-bottom: 2rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            display: block;
            text-align: center;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        /* メインアクション用 */
        .btn-main {
            background-color: var(--accent-color);
            color: white;
        }
        .btn-main:hover { background-color: #357abd; }

        /* プレレジ関連のサブボタン */
        .btn-outline {
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            background: transparent;
        }
        .btn-outline:hover { background-color: rgba(74, 144, 226, 0.1); }

        /* 履歴関連の控えめなボタン */
        .btn-ghost {
            color: var(--secondary-color);
            border: 1px solid #ced4da;
            background: transparent;
            font-size: 0.8rem;
        }
        .btn-ghost:hover { border-color: var(--secondary-color); color: var(--secondary-color); }

        @media (max-width: 600px) {
            h1 { font-size: 1.7rem; }
            .card { padding: 1.5rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>尚絅学院大学 心理学実験室</h1>
    </header>

    <div class="container">
        <section class="intro">
            <p>ご訪問ありがとうございます。以下の実験へのご協力をお願いいたします。<br>各実験は数分で終わります。スマートフォンからも参加可能です。</p>
        </section>

        <main class="grid">
            <article class="card">
                <h2>実験：ワーキングメモリ課題における記憶負荷（N-Back）が反応時間および正答率に及ぼす影響</h2>
                <p>N-Back課題を用いて、ワーキングメモリ負荷が認知パフォーマンスに与える影響を測定します。</p>
                <div class="btn-group">
                    <a href="n-back.html" class="btn btn-main">実験に参加する</a>
                    <a href="https://github.com/taka464/my-experiment/blob/main/preregistration.md" class="btn btn-outline">プレレジを確認する</a>
                    <a href="https://github.com/taka464/my-experiment/commits/main/preregistration.md" class="btn btn-ghost">変更履歴（証拠）を確認する</a>
                </div>
            </article>
        </main>
    </div>

</body>
</html>
