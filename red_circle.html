<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>jsPsych Experiment</title>
  <!-- jsPsych 7.3.4 CDN -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    /* 仕様1: 背景色を灰色に設定 */
    body {
      background-color: #808080;
      color: white; /* テキストを読みやすくするため白に設定 */
    }

    /* 仕様2: 直径100pxの赤い円 */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: red;
      border-radius: 50%; /* 正方形を円にする */
      margin: 0 auto; /* 中央揃え用 */
    }

    /* jsPsychのコンテンツ外観調整 */
    .jspsych-display-element {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>
</body>
<script>
  /**
   * jsPsychの初期化
   */
  const jsPsych = initJsPsych({
    display_element: 'jspsych-target',
    on_finish: function() {
      // 実験終了時にデータを表示（デバッグ用）
      // jsPsych.data.displayData();
    }
  });

  // タイムラインの作成
  const timeline = [];

  /**
   * 試行1: 赤い円の表示
   * 仕様2 & 3: スペースキーが押されるまで赤い円を表示
   */
  const circle_trial = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<div class="red-circle"></div>',
    choices: [' '], // スペースキーのみを受け付ける
    prompt: '<p style="margin-top: 20px;">スペースキーを押して次へ進んでください</p>'
  };
  timeline.push(circle_trial);

  /**
   * 試行2: 終了メッセージ
   * 仕様4: キーが押されたら終了メッセージを表示
   */
  const end_message = {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: '<h1>実験が終了しました。</h1><p>ご協力ありがとうございました。</p>',
    choices: "NO_KEYS", // キー入力を受け付けない
    duration: 3000     // 3秒後に終了
  };
  timeline.push(end_message);

  // 実験の実行
  jsPsych.run(timeline);
</script>
</html>
