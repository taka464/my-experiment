<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1-Back & 2-Back ワーキングメモリ実験</title>
    <script src="https://unpkg.com/jspsych@7.3.4"></script>
    <script src="https://unpkg.com/@jspsych/plugin-html-button-response@1.1.3"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif; line-height: 1.6; }
        .stimulus { font-size: 80px; font-weight: bold; height: 100px; display: flex; align-items: center; justify-content: center; }
        .jspsych-btn { padding: 15px 30px; font-size: 1.2rem; margin: 10px; border-radius: 8px; }
        .chart-container { display: flex; justify-content: space-around; align-items: flex-end; height: 200px; border-bottom: 2px solid #333; margin: 20px 0; padding: 0 40px; }
        .bar { width: 60px; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; color: white; font-weight: bold; }
        .bar-label { margin-top: 10px; color: #333; font-weight: normal; }
        .explanation { background: #eef7ff; padding: 20px; border-radius: 8px; margin-top: 20px; }
    </style>
</head>
<body></body>
<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycby1fccn4e9O9dkIH686ivSMoHJ_9JEOcg4ILAnGBAblKtT436snsX6CGAP_LWLhNIHO_w/exec';

    const jsPsych = initJsPsych({
        on_finish: function() {
            const display = jsPsych.getDisplayElement();
            display.innerHTML = "<h1>データを送信中です...</h1>";

            const data = jsPsych.data.get().filter({trial_type: 'html-button-response'}).values()
                .filter(d => d.condition)
                .map(d => ({
                    condition: d.condition,
                    trial: d.trial_index,
                    stimulus: d.stimulus,
                    correct: d.correct,
                    rt: d.rt
                }));

            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).finally(() => {
                // 送信完了後、メッセージとフィードバック画面を表示
                const stats = { '1-back': { acc: [], rt: [] }, '2-back': { acc: [], rt: [] } };
                data.forEach(d => { stats[d.condition].acc.push(d.correct); stats[d.condition].rt.push(d.rt); });
                const calc = (c) => ({ acc: (stats[c].acc.filter(v=>v).length/20)*100, rt: stats[c].rt.reduce((a,b)=>a+b,0)/20 });
                const s1 = calc('1-back'), s2 = calc('2-back');

                display.innerHTML = `<h1>実験終了。ご協力ありがとうございました。</h1>
                <div class="chart-container">
                    <div class="bar" style="height:${s1.acc*1.5}px; background:#4ade80;">${Math.round(s1.acc)}%<div class="bar-label">1-Back</div></div>
                    <div class="bar" style="height:${s2.acc*1.5}px; background:#4ade80;">${Math.round(s2.acc)}%<div class="bar-label">2-Back</div></div>
                </div>
                <div class="chart-container">
                    <div class="bar" style="height:${Math.min(s1.rt/5, 150)}px; background:#60a5fa;">${Math.round(s1.rt)}<div class="bar-label">1-Back</div></div>
                    <div class="bar" style="height:${Math.min(s2.rt/5, 150)}px; background:#60a5fa;">${Math.round(s2.rt)}<div class="bar-label">2-Back</div></div>
                </div>`;
            });
        }
    });

    function generateStimuli(n) {
        const chars = ['A', 'B', 'C', 'D', 'E'];
        let sequence = [];
        for (let i = 0; i < n; i++) sequence.push(chars[Math.floor(Math.random() * chars.length)]);
        let targetIndices = [];
        while (targetIndices.length < 6) {
            let idx = Math.floor(Math.random() * (20 - n)) + n;
            if (!targetIndices.includes(idx)) targetIndices.push(idx);
        }
        targetIndices.sort((a, b) => a - b);
        for (let i = n; i < 20; i++) {
            if (targetIndices.includes(i)) sequence.push(sequence[i - n]);
            else {
                let nextChar;
                do { nextChar = chars[Math.floor(Math.random() * chars.length)]; } while (nextChar === sequence[i - n]);
                sequence.push(nextChar);
            }
        }
        return sequence.map((char, index) => ({ char, isTarget: index >= n && char === sequence[index - n] }));
    }

    const timeline = [{
        type: jsPsychSurveyText,
        questions: [{ prompt: "参加者IDを入力してください", required: true, name: "id" }],
        button_label: "次へ"
    }];

    ['1-back', '2-back'].forEach((cond, idx) => {
        timeline.push({
            type: jsPsychHtmlButtonResponse,
            stimulus: `<h1>${cond === '1-back' ? '前半' : '後半'}：${cond.toUpperCase()}課題</h1><p>${cond === '1-back' ? '1つ前' : '2つ前'}の文字と同じなら「同じ」を押してください。</p>`,
            choices: ['開始する']
        });
        generateStimuli(idx + 1).forEach((trial, tIdx) => {
            timeline.push({
                type: jsPsychHtmlButtonResponse,
                stimulus: `<div class='stimulus'>${trial.char}</div>`,
                choices: ['同じ', '違う'],
                keyboard_choices: ['f', 'j'],
                stimulus_duration: 500,
                trial_duration: 2000,
                response_ends_trial: false,
                data: { condition: cond, trial_index: tIdx + 1, stimulus: trial.char, isTarget: trial.isTarget },
                on_finish: function(data) { data.correct = (data.response === 0) === data.isTarget; }
            });
        });
        if (cond === '1-back') timeline.push({ type: jsPsychHtmlButtonResponse, stimulus: "<h1>休憩</h1><p>少し休んでから後半へ進んでください。</p>", choices: ['後半を開始'] });
    });

    jsPsych.run(timeline);
</script>
</html>
