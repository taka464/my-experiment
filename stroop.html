<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stroop Task - jsPsych</title>
    <!-- jsPsych 7.3.3 コアライブラリ -->
    <script src="https://unpkg.com/jspsych@7.3.3"></script>
    <!-- jsPsych プラグイン -->
    <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.2"></script>
    <script src="https://unpkg.com/@jspsych/plugin-survey-text@1.1.3"></script>
    <!-- jsPsych CSS -->
    <link href="https://unpkg.com/jspsych@7.3.3/css/jspsych.css" rel="stylesheet" type="text/css" />
    <style>
        body { background-color: #FFFFFF; color: #333; font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; }
        .stroop-stimulus { font-size: 60px; font-weight: bold; }
        .instructions { font-size: 24px; line-height: 1.6; text-align: left; display: inline-block; }
        .fixation { font-size: 60px; }
    </style>
</head>
<body>
    <div id="jspsych-target"></div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbxSMxSwFkYM9nc5bHw7ODs0N2NzxnFHVjLmqsseSFFhwGdcryWXrlE6jArKg0eLBfVX/exec';

        const jsPsych = initJsPsych({
            on_finish: function() {
                const displayElement = jsPsych.getDisplayElement();
                displayElement.innerHTML = '<p>データを送信中です...</p>';

                // データの抽出・整形
                const data = jsPsych.data.get().filter({task: 'response'}).values().map(d => ({
                    subject_id: d.subject_id,
                    timestamp: d.timestamp,
                    word: d.stimulus_text,
                    color: d.stimulus_color,
                    condition: d.condition,
                    rt: d.rt,
                    correct: d.correct ? "TRUE" : "FALSE"
                }));

                fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                }).then(() => {
                    displayElement.innerHTML = '<p>実験終了。ご協力ありがとうございました。</p>';
                }).catch(() => {
                    displayElement.innerHTML = '<p>送信に失敗しました。</p>';
                });
            }
        });

        const timeline = [];

        // (1) ID入力
        const id_trial = {
            type: jsPsychSurveyText,
            questions: [{ prompt: "参加者IDを入力してください", name: "subject_id", required: true }],
            on_finish: function(data) {
                const id = data.response.subject_id;
                const time = new Date().toLocaleString();
                jsPsych.data.addProperties({ subject_id: id, timestamp: time });
            }
        };
        timeline.push(id_trial);

        // (2) 教示
        const instructions = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: `<div class="instructions"><p>文字の「色」をキーボードで答えてください。</p><p>赤(r), 青(b), 緑(g)</p><p>スペースキーで開始。</p></div>`,
            choices: [' '],
            post_trial_gap: 500
        };
        timeline.push(instructions);

        // 刺激設定
        const words = [{ text: "赤", label: "red" }, { text: "青", label: "blue" }, { text: "緑", label: "green" }];
        const colors = [{ hex: "red", label: "red", key: 'r' }, { hex: "blue", label: "blue", key: 'b' }, { hex: "green", label: "green", key: 'g' }];
        
        const base_stimuli = [];
        for (let w of words) {
            for (let c of colors) {
                base_stimuli.push({
                    stimulus_text: w.text,
                    stimulus_color: c.label,
                    hex: c.hex,
                    correct_response: c.key,
                    condition: (w.label === c.label) ? 'congruent' : 'incongruent'
                });
            }
        }

        const fixation = { type: jsPsychHtmlKeyboardResponse, stimulus: '<div class="fixation">+</div>', choices: "NO_KEYS", trial_duration: 500, data: { task: 'fixation' } };

        const test_trial = {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: () => `<div class="stroop-stimulus" style="color: ${jsPsych.timelineVariable('hex')}">${jsPsych.timelineVariable('stimulus_text')}</div>`,
            choices: ['r', 'b', 'g'],
            data: {
                task: 'response',
                correct_response: jsPsych.timelineVariable('correct_response'),
                condition: jsPsych.timelineVariable('condition'),
                stimulus_text: jsPsych.timelineVariable('stimulus_text'),
                stimulus_color: jsPsych.timelineVariable('stimulus_color')
            },
            on_finish: function(data) {
                data.correct = jsPsych.pluginAPI.compareKeys(data.response, data.correct_response);
            }
        };

        // ランダムに10回抽出して実施する設定
        timeline.push({
            timeline: [fixation, test_trial],
            timeline_variables: base_stimuli,
            sample: {
                type: 'with-replacement',
                size: 10
            },
            post_trial_gap: 1000
        });

        jsPsych.run(timeline);
    </script>
</body>
</html>
